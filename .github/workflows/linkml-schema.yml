name: LinkML schema

on:
  pull_request:
    paths:
      - "causalmosaic.yaml"
      - ".github/workflows/linkml-schema.yml"
  push:
    paths:
      - "causalmosaic.yaml"
      - ".github/workflows/linkml-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate and lint schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LinkML
        run: python -m pip install --disable-pip-version-check "linkml==1.11.1"

      - name: Validate against the LinkML metamodel
        run: linkml validate causalmosaic.yaml

      - name: Lint the schema
        if: ${{ !cancelled() }}
        run: linkml lint causalmosaic.yaml
