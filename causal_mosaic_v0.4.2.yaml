## =============================================================================
## Causal Mosaic Schema (CAMO)
## =============================================================================
## Merges: Ecolink Model Ontology (ELM; ontology implementation of the ELM
##         pattern) for ecological entity
##         structure with Illari & Russo's (2014) causal mosaic framework for
##         rich causal annotation. ELM provides the entity layer (environmental
##         variables, processes, taxa decomposed into entity + attribute +
##         state/change qualifier). The Causal Mosaic provides the causal semantics layer
##         (philosophical accounts, 15 causal features, evidential basis).
##
## Designed to support multiple renderings from a single canonical graph:
##   - Rosetta Statements (template-based NL rendering)
##   - Fuzzy Cognitive Maps and other causal models
##   - Evidence Gap Maps (intervention × outcome matrices)
##   - Retrieval-Augmented Generation (RAG)
##   - Causal diagrams, practitioner summaries, and future formats
##
## Key design principle: Causation in ecology is represented between causally
## relevant states or changes in state, not between things alone. A taxon does
## not cause anything by itself; the causally relevant annotation concerns the
## state or change of an attribute of a taxon-linked variable. Nodes therefore
## decompose into entity (what thing) + attribute (what measurable property) +
## state/change qualifier (whether or how it changed), following ELM's qualifier
## pattern.
##
## Schema version: 0.4.2
## =============================================================================

id: https://w3id.org/causal-mosaic
name: causal-mosaic
title: Causal Mosaic Schema for Ecological Evidence Synthesis
description: >-
  A unified schema that can be used to document causal linkages between ecological
  entities including processes, species populations and environmental variables.
  This has been created in consultation with philosophers of causality including
  Dr. Phyllis Illari and Dr. Robert Fruehstueckl as part of the EcoWeaver project
  (https://ecoweaver.hi-knowledge.org). This schema produces a labeled property
  graph that can be used to render fuzzy cognitive maps, evidence gap maps, RAG
  indices and practitioner-oriented summaries of evidence.

license: CC0
version: 0.4.2

see_also:
  - https://doi.org/10.1007/978-3-032-06136-2_33  # Alamenciak et al. 2025 ELM paper
  - https://global.oup.com/academic/product/causality-9780199662678  # Illari & Russo 2014

