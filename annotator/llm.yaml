# =============================================================================
# Causal Mosaic — LLM Configuration
# =============================================================================
# This file controls which language model is used for annotation extraction.
# All pipeline scripts read this file at startup.
#
# Edit this file before running extract.py or pipeline.py.
# =============================================================================

# -----------------------------------------------------------------------------
# Provider
# -----------------------------------------------------------------------------
# "openai_compatible" — any endpoint that speaks the OpenAI Chat Completions
#                       API, including vLLM, Ollama, Together AI, Groq, or
#                       OpenAI itself.
# "anthropic"         — Anthropic Claude models via the Anthropic SDK.
#
provider: openai_compatible

# -----------------------------------------------------------------------------
# OpenAI-compatible settings  (used when provider: openai_compatible)
# -----------------------------------------------------------------------------
# base_url: the root URL of the Chat Completions endpoint.
#   vLLM local:     http://localhost:8000/v1
#   Ollama local:   http://localhost:11434/v1
#   Together AI:    https://api.together.xyz/v1
#   Groq:           https://api.groq.com/openai/v1
#   OpenAI:         https://api.openai.com/v1
#
base_url: "http://localhost:8000/v1"

# model: the model identifier as expected by the endpoint.
#   vLLM serves the model path used at launch, e.g.:
#     meta-llama/Llama-3.3-70B-Instruct
#     mistralai/Mistral-7B-Instruct-v0.3
#   Ollama uses short names like "llama3.3:70b"
#   OpenAI uses "gpt-4o", "gpt-4o-mini", etc.
#
model: "meta-llama/Llama-3.3-70B-Instruct"

# api_key_env: name of the environment variable that holds the API key.
#   For vLLM with no auth:   set the env var to any non-empty string, e.g. "none"
#   For Together/Groq/OpenAI: set the env var to your actual API key
#   Default variable name:   LLM_API_KEY
#
#   Example shell setup:
#     export LLM_API_KEY="your-api-key-here"
#     export LLM_API_KEY="none"   # for unauthenticated local vLLM
#
api_key_env: "LLM_API_KEY"

# -----------------------------------------------------------------------------
# Anthropic settings  (used when provider: anthropic)
# -----------------------------------------------------------------------------
# Uncomment and edit these lines to switch to Anthropic Claude.
# The API key is always read from the ANTHROPIC_API_KEY environment variable.
#
# provider: anthropic
# model: "claude-sonnet-4-6"
# # Other available models:
# # model: "claude-opus-4-6"
# # model: "claude-haiku-4-5-20251001"

# -----------------------------------------------------------------------------
# Generation settings  (apply to all providers)
# -----------------------------------------------------------------------------
# max_tokens: maximum number of tokens in the model response.
#   Increase for very long papers or if output is being truncated.
#   Reduce if your endpoint has a lower context limit.
#
max_tokens: 8192

# temperature: sampling temperature (0.0 = deterministic, 1.0 = creative).
#   Low values are strongly recommended for structured extraction tasks.
#
temperature: 0.1
